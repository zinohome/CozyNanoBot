# =============================================================================
# 镜像仓库配置
# IMAGE_REGISTRY: Docker 镜像仓库前缀（包含命名空间）
#   本地开发（默认）: harbor.naivehero.top:8443/cozyai
#   AWS 生产 (ECR) : 345182146241.dkr.ecr.ap-east-1.amazonaws.com/cozyai
#   使用方法: 在 .env 文件中设置 IMAGE_REGISTRY=<仓库前缀>
# =============================================================================

name: cozynanobot

# CozyNanoBot — MCP 工具执行引擎（Cerebellum）
# 1Panel 项目名：cozynanobot
#
# 数据存储：/data/CozyNanoBot/
# 网络：1panel-network（外部共享）
#
# 被调用方：Brain 通过 http://cozynanobot:8080 调用
# LLM 调用：通过 CozyGate（http://cozygate:9090/v1）

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:

  nanobot:
    image: ${IMAGE_REGISTRY:-harbor.naivehero.top:8443/cozyai}/cozy-nanobot:latest
    container_name: cozynanobot
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://cozygate:9090/v1}
      NANOBOT_PROVIDERS__OPENAI__API_KEY: ${OPENAI_API_KEY:-}
      NANOBOT_PROVIDERS__OPENAI__API_BASE: ${OPENAI_BASE_URL:-http://cozygate:9090/v1}
      NANOBOT_AGENTS__DEFAULTS__MODEL: ${NANOBOT_MODEL:-gpt-4o-mini}
      TENCENT_SECRET_ID: ${TENCENT_SECRET_ID:-}
      TENCENT_SECRET_KEY: ${TENCENT_SECRET_KEY:-}
    ports:
      - "28080:8080"
    volumes:
      - /data/CozyNanoBot/workspace:/app/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
