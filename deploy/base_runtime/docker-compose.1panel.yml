# CozyNanoBot Base Runtime
# 1Panel 专用 Docker Compose 编排文件
# 数据存储：/data/CozyNanoBot/
# 网络：1panel-network（外部预建网络，与 CozyEngineV2 生态共用）

services:

  cozy_nanobot:
    image: cozy-nanobot:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: cozy_nanobot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # nanobot 用 pydantic-settings 的 NANOBOT_ 前缀 + __ 嵌套分隔符读 env
      # 从我们标准的 OPENAI_* env 桥接到 NANOBOT_* 命名空间
      NANOBOT_PROVIDERS__OPENAI__API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required (see .env.example)}
      NANOBOT_PROVIDERS__OPENAI__API_BASE: ${OPENAI_BASE_URL:-}
      # 可选：指向容器内的 nanobot 配置文件（默认已打包在镜像 /app/config/nanobot.yaml）
      NANOBOT_CONFIG: ${NANOBOT_CONFIG:-/app/config/nanobot.yaml}
      # nanobot workspace — 持久化到 /data/CozyNanoBot/workspace
      NANOBOT_WORKSPACE: /workspace
      HOST: 0.0.0.0
      PORT: "8080"
    command:
      - nanobot
      - serve
      - -c
      - /app/config/nanobot.yaml
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    ports:
      - "8080:8080"
    volumes:
      # nanobot workspace 持久化目录
      - /data/CozyNanoBot/workspace:/workspace
      # 可选：挂载外部 nanobot.yaml 覆盖镜像内默认配置（取消注释即可）
      # - ./nanobot.yaml:/app/config/nanobot.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  caddy:
    image: caddy:alpine
    container_name: cozy_nanobot_caddy
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /data/CozyNanoBot/caddy/data:/data
      - /data/CozyNanoBot/caddy/config:/config
    depends_on:
      - cozy_nanobot
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
