# CozyNanoBot 运行配置 — 由 `nanobot serve -c config/nanobot.yaml` 加载
# Schema 参考 upstream/nanobot/nanobot/config/schema.py 的 Config 类

agents:
  defaults:
    # LLM 模型（provider 会自动匹配）
    model: gpt-4o-mini
    max_tool_iterations: 5
    context_window_tokens: 128000
    workspace: ~/.cozy-nanobot/workspace

providers:
  openai:
    # 通过 ${VAR} 引用环境变量（loader.py resolve_config_env_vars 处理）
    api_key: "${OPENAI_API_KEY}"
    api_base: "${OPENAI_BASE_URL}"

api:
  host: 0.0.0.0
  port: 8080
  timeout: 120.0

tools:
  # nanobot 内置工具（按需关开）
  web:
    enable: false
  exec:
    enable: false
  my:
    enable: false
  restrict_to_workspace: true

  # ★ 我们的 MCP servers（混合粒度：网 IO 独立，轻工具合并进 info_tools）
  mcp_servers:
    weather:
      type: stdio
      command: python
      args: ["-m", "cozy_mcp_tools.weather"]
      tool_timeout: 10
    search:
      type: stdio
      command: python
      args: ["-m", "cozy_mcp_tools.search"]
      tool_timeout: 12
    calculator:
      type: stdio
      command: python
      args: ["-m", "cozy_mcp_tools.calculator"]
      tool_timeout: 5
    info_tools:
      type: stdio
      command: python
      args: ["-m", "cozy_mcp_tools.info_tools"]
      tool_timeout: 5
    web_fetch:
      type: stdio
      command: python
      args: ["-m", "cozy_mcp_tools.web_fetch"]
      tool_timeout: 15
    translate:
      type: stdio
      command: python
      args: ["-m", "cozy_mcp_tools.translate"]
      tool_timeout: 12
    news:
      type: stdio
      command: python
      args: ["-m", "cozy_mcp_tools.news"]
      tool_timeout: 15
